# Render Blueprint — deploys the full Lynd voice agent stack
# https://render.com/docs/blueprint-spec

services:
  # FastAPI web service (handles API + WebSocket)
  - type: web
    name: lynd-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lynd-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lynd-redis
          type: redis
          property: connectionString
      - key: APP_BASE_URL
        sync: false  # Set after first deploy (e.g. https://lynd-api.onrender.com)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production

  # Celery worker (processes outreach jobs)
  - type: worker
    name: lynd-worker
    runtime: docker
    plan: starter
    dockerCommand: celery -A src.queue.worker:celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lynd-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lynd-redis
          type: redis
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production

databases:
  - name: lynd-db
    plan: starter
    postgresMajorVersion: 15
    ipAllowList: []  # Only internal access

# Note: Render managed Redis is available via dashboard.
# Create it manually and link via REDIS_URL env var if
# the blueprint redis reference doesn't work on your plan.
